name: Windows CI

on:
#  push:
#    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Install Qt 6
      #   uses: jurplel/install-qt-action@v4
      #   with:
      #     version: "6.8.3"
      #     arch: win64_msvc2022_64
      #     modules: qthttpserver qtwebsockets qtmultimedia

      - name: Install Qt 6
        shell: pwsh
        run: |
          pip install aqtinstall
          $qtDir = "D:\Qt"

          Write-Host "=== Available modules for 6.8.3 win64_msvc2022_64 ==="
          aqt list-qt windows desktop --modules 6.8.3 win64_msvc2022_64

          Write-Host "=== Installing Qt base + modules ==="
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 -m qthttpserver qtwebsockets qtmultimedia -O $qtDir

          $root = "$qtDir\6.8.3\msvc2022_64"
          echo "QT_ROOT_DIR=$root" >> $env:GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$root" >> $env:GITHUB_ENV
          echo "$root\bin" >> $env:GITHUB_PATH

          Write-Host "=== Verifying Qt6WebSockets ==="
          if (Test-Path "$root\lib\cmake\Qt6WebSockets") {
            Write-Host "OK: Qt6WebSockets found"
          } else {
            Write-Host "WARN: Qt6WebSockets NOT found, listing cmake dir:"
            Get-ChildItem "$root\lib\cmake" -Directory | Select-Object Name
          }

      - name: Install OpenSSL
        run: choco install openssl -y --no-progress

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Bundle
        run: scripts\bundle-win.bat build "$env:QT_ROOT_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eMuleQt-win64
          path: eMuleQt-win64.zip
