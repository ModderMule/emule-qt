name: Windows CI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: win64_msvc2022_64
          modules: qthttpserver qtwebsockets qtmultimedia

      - name: Ensure Qt WebSockets module
        shell: pwsh
        run: |
          $wsDir = "$env:QT_ROOT_DIR/lib/cmake/Qt6WebSockets"
          if (-not (Test-Path $wsDir)) {
            Write-Host "Qt6WebSockets not found, installing via aqt..."
            pip install aqtinstall
            aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 -m qtwebsockets -O "$env:QT_ROOT_DIR/../../.."
          } else {
            Write-Host "Qt6WebSockets already installed at $wsDir"
          }

      - name: Install OpenSSL
        run: choco install openssl -y --no-progress

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Bundle
        run: scripts\bundle-win.bat build "$env:QT_ROOT_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eMuleQt-win64
          path: eMuleQt-win64.zip
